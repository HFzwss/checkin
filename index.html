<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 不生气打卡 - 我们的约定</title>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #ff6b9d;
    --pink-light: #ffb3cc;
    --rose: #e8536c;
    --peach: #ffa07a;
    --gold: #f0c060;
    --red: #ff4757;
    --red-dark: #c0392b;
    --bg-start: #1a0a14;
    --bg-mid: #2d1b2e;
    --bg-end: #0f1626;
    --card-bg: rgba(255, 255, 255, 0.06);
    --card-border: rgba(255, 255, 255, 0.10);
    --text: #f0e0e8;
    --text-dim: #b8a0b0;
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    --radius: 18px;
  }

  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 40%, var(--bg-end) 100%);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* ===== Floating Hearts Background ===== */
  .hearts-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .floating-heart {
    position: absolute;
    animation: floatUp linear infinite;
    opacity: 0;
    font-size: 1.4rem;
  }
  @keyframes floatUp {
    0%   { transform: translateY(105vh) scale(0.3) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.35; }
    90%  { opacity: 0.15; }
    100% { transform: translateY(-10vh) scale(1.1) rotate(25deg); opacity: 0; }
  }

  /* ===== Main Container ===== */
  .app {
    position: relative; z-index: 1;
    width: min(500px, 94vw);
    padding: 28px 22px 20px;
  }

  /* ===== Header ===== */
  .header {
    text-align: center; margin-bottom: 24px;
  }
  .header .icon-row {
    font-size: 2.2rem; margin-bottom: 4px;
    animation: gentleBounce 2s ease-in-out infinite;
  }
  @keyframes gentleBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .header h1 {
    font-size: 1.7rem; font-weight: 700;
    background: linear-gradient(135deg, var(--pink-light), var(--pink), var(--peach));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 2px;
    letter-spacing: 1px;
  }
  .header .subtitle {
    font-size: 0.85rem; color: var(--text-dim);
  }

  /* ===== Streak Card ===== */
  .streak-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    backdrop-filter: blur(14px);
    padding: 20px 18px;
    text-align: center;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    transition: border-color 0.4s;
  }
  .streak-card.angry-today {
    border-color: rgba(255, 71, 87, 0.4);
  }
  .streak-card .streak-number {
    font-size: 4.2rem; font-weight: 800;
    background: linear-gradient(180deg, #fff 20%, var(--pink-light) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    transition: all 0.3s;
  }
  .streak-card.angry-today .streak-number {
    background: linear-gradient(180deg, #ff6b6b 20%, var(--red) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    font-size: 2rem;
  }
  .streak-card .streak-number.pulse {
    animation: popIn 0.6s cubic-bezier(0.68, -0.6, 0.32, 1.6);
  }
  @keyframes popIn {
    0% { transform: scale(0.5); opacity: 0; }
    50% { transform: scale(1.25); }
    100% { transform: scale(1); opacity: 1; }
  }
  .streak-card .streak-label {
    font-size: 0.95rem; color: var(--text-dim);
    margin-top: 2px;
    transition: color 0.4s;
  }
  .streak-card.angry-today .streak-label {
    color: #ff6b6b;
  }
  .streak-card .highest {
    font-size: 0.78rem; color: var(--text-dim); opacity: 0.7;
    margin-top: 4px;
  }
  .streak-card .highest span { color: var(--gold); font-weight: 600; }

  /* ===== Two-people Check-in ===== */
  .checkin-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .checkin-card {
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    border-radius: var(--radius);
    backdrop-filter: blur(14px);
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .checkin-card:hover {
    transform: translateY(-3px);
    border-color: rgba(255, 255, 255, 0.22);
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.3);
  }
  .checkin-card:active {
    transform: scale(0.96);
    transition: transform 0.1s;
  }

  .checkin-card.checked {
    border-color: rgba(240, 192, 96, 0.5) !important;
    background: rgba(240, 192, 96, 0.08) !important;
  }
  .checkin-card.done {
    border-color: rgba(255, 107, 157, 0.5) !important;
    background: rgba(255, 107, 157, 0.06) !important;
    cursor: default;
    pointer-events: none;
  }
  .checkin-card.today-done {
    cursor: default;
    pointer-events: none;
    opacity: 0.55;
  }

  .checkin-card .avatar {
    width: 50px; height: 50px; border-radius: 50%;
    margin: 0 auto 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    background: rgba(255, 255, 255, 0.07);
    transition: all 0.35s;
  }
  .checkin-card.checked .avatar {
    background: rgba(240, 192, 96, 0.18);
    box-shadow: 0 0 22px rgba(240, 192, 96, 0.25);
  }
  .checkin-card.done .avatar {
    background: rgba(255, 107, 157, 0.15);
    box-shadow: 0 0 18px rgba(255, 107, 157, 0.2);
  }
  .checkin-card .name {
    font-size: 0.95rem; font-weight: 600;
    color: #e0d0d8;
    margin-bottom: 3px;
    cursor: text;
    padding: 2px 8px; border-radius: 6px;
    outline: none;
    transition: background 0.2s;
    max-width: 120px;
    margin-left: auto; margin-right: auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .checkin-card .name:hover {
    background: rgba(255,255,255,0.05);
  }
  .checkin-card .name:focus {
    background: rgba(255,255,255,0.10);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.15);
  }
  .checkin-card .status {
    font-size: 0.75rem; color: var(--text-dim);
    transition: color 0.35s;
  }
  .checkin-card.checked .status { color: var(--gold); }
  .checkin-card.done .status { color: var(--pink-light); }
  .checkin-card .check-mark {
    position: absolute;
    top: 8px; right: 12px;
    font-size: 1rem;
    opacity: 0;
    transform: scale(0);
    transition: all 0.35s cubic-bezier(0.68, -0.6, 0.32, 1.6);
  }
  .checkin-card.checked .check-mark,
  .checkin-card.done .check-mark {
    opacity: 1;
    transform: scale(1);
  }

  /* Ripple */
  .checkin-card .ripple {
    position: absolute; border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    transform: scale(0); animation: rippleOut 0.7s ease-out forwards;
    pointer-events: none;
  }
  @keyframes rippleOut {
    to { transform: scale(4); opacity: 0; }
  }

  /* ===== Angry Button ===== */
  .angry-section {
    margin-bottom: 16px;
  }
  .angry-btn {
    width: 100%;
    padding: 13px;
    border-radius: var(--radius);
    border: 1.5px solid rgba(255, 71, 87, 0.3);
    background: rgba(255, 71, 87, 0.06);
    color: #e0a0a8;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    backdrop-filter: blur(14px);
    transition: all 0.35s;
    font-family: inherit;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .angry-btn:hover {
    background: rgba(255, 71, 87, 0.14);
    border-color: rgba(255, 71, 87, 0.55);
    color: #ffa0aa;
    box-shadow: 0 8px 28px rgba(255, 71, 87, 0.15);
  }
  .angry-btn:active {
    transform: scale(0.97);
    transition: transform 0.1s;
  }
  .angry-btn.today-done {
    opacity: 0.4;
    pointer-events: none;
    cursor: default;
  }
  .angry-btn .angry-emoji {
    font-size: 1.2rem;
  }

  /* ===== Celebration effect ===== */
  .celebrate-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 100;
  }
  .confetti {
    position: absolute;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  /* ===== Monthly Calendar ===== */
  .calendar-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    backdrop-filter: blur(14px);
    padding: 16px 14px 12px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .calendar-card .cal-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 12px;
  }
  .calendar-card .cal-title {
    font-size: 0.9rem; font-weight: 600;
    color: #d0c0d0;
  }
  .calendar-card .cal-legend {
    display: flex; gap: 12px;
    font-size: 0.65rem; color: var(--text-dim); opacity: 0.6;
    align-items: center;
  }
  .calendar-card .cal-legend span {
    display: flex; align-items: center; gap: 3px;
  }
  .legend-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  }
  .legend-dot.happy { background: var(--pink); }
  .legend-dot.angry { background: var(--red); }
  .legend-dot.partial { background: var(--gold); }

  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    text-align: center; margin-bottom: 4px;
  }
  .cal-weekdays span {
    font-size: 0.65rem; color: var(--text-dim); opacity: 0.5;
    padding: 4px 0;
  }
  .cal-weekdays span:first-child,
  .cal-weekdays span:last-child {
    color: rgba(255, 107, 157, 0.5);
  }

  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 3px; text-align: center;
  }
  .cal-grid .day-cell {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 0.72rem;
    color: #c0b0c0;
    transition: all 0.25s;
    cursor: default;
    position: relative;
    gap: 1px;
  }
  .cal-grid .day-cell.empty {
    pointer-events: none;
  }
  .cal-grid .day-cell.today {
    outline: 2px solid rgba(255, 255, 255, 0.3);
    outline-offset: 1px;
    font-weight: 700;
    color: #fff;
  }
  .cal-grid .day-cell.happy {
    background: rgba(255, 107, 157, 0.2);
    color: var(--pink-light);
  }
  .cal-grid .day-cell.happy .day-icon { font-size: 0.55rem; }
  .cal-grid .day-cell.angry {
    background: rgba(255, 71, 87, 0.2);
    color: #ff8088;
  }
  .cal-grid .day-cell.angry .day-icon { font-size: 0.55rem; }
  .cal-grid .day-cell.partial {
    background: rgba(240, 192, 96, 0.15);
    color: var(--gold);
  }
  .cal-grid .day-cell .day-num {
    font-size: 0.7rem; line-height: 1;
  }

  /* ===== Monthly Stats ===== */
  .month-stats {
    display: flex; justify-content: space-around;
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.06);
    font-size: 0.72rem; color: var(--text-dim);
  }
  .month-stats .stat {
    text-align: center;
  }
  .month-stats .stat-val {
    font-size: 1.1rem; font-weight: 700;
  }
  .month-stats .stat-val.good { color: var(--pink-light); }
  .month-stats .stat-val.bad { color: #ff8088; }

  /* ===== Quote ===== */
  .quote {
    text-align: center; font-size: 0.82rem;
    color: var(--text-dim); opacity: 0.7;
    font-style: italic;
    transition: opacity 0.5s;
  }

  /* ===== Reset ===== */
  .reset-hint {
    text-align: center; margin-top: 16px;
    font-size: 0.7rem; color: var(--text-dim); opacity: 0.3;
    cursor: pointer; transition: opacity 0.3s;
  }
  .reset-hint:hover { opacity: 0.6; }

  /* ===== Toast ===== */
  .toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(30, 10, 20, 0.95); color: #fff;
    padding: 12px 26px; border-radius: 50px;
    font-weight: 600; font-size: 0.88rem;
    z-index: 200; pointer-events: none;
    opacity: 0; transition: opacity 0.4s, transform 0.4s;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .toast.show {
    opacity: 1; transform: translateX(-50%) translateY(4px);
  }
  .toast.angry-toast {
    background: rgba(180, 40, 40, 0.95);
    border-color: rgba(255, 71, 87, 0.4);
  }

  /* ===== Modal (for angry confirm) ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 150; display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: #1e1018;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius);
    padding: 24px 22px;
    text-align: center;
    width: min(340px, 88vw);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: scaleIn 0.25s cubic-bezier(0.68, -0.6, 0.32, 1.6);
  }
  @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal .modal-emoji { font-size: 3rem; margin-bottom: 10px; }
  .modal p { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 18px; line-height: 1.5; }
  .modal .modal-btns { display: flex; gap: 10px; }
  .modal .modal-btns button {
    flex: 1; padding: 10px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    font-size: 0.85rem; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: all 0.2s;
  }
  .modal .btn-cancel {
    background: transparent; color: var(--text-dim);
  }
  .modal .btn-cancel:hover { background: rgba(255,255,255,0.05); }
  .modal .btn-confirm {
    background: rgba(255, 71, 87, 0.15);
    color: #ff8088;
    border-color: rgba(255, 71, 87, 0.35);
  }
  .modal .btn-confirm:hover {
    background: rgba(255, 71, 87, 0.25);
  }

  /* ===== Responsive ===== */
  @media (max-width: 400px) {
    .app { padding: 18px 12px 14px; }
    .streak-card .streak-number { font-size: 3.5rem; }
    .streak-card.angry-today .streak-number { font-size: 1.8rem; }
    .checkin-section { gap: 8px; }
    .checkin-card { padding: 12px 8px; }
    .checkin-card .avatar { width: 40px; height: 40px; font-size: 1.4rem; }
    .cal-grid .day-cell { border-radius: 6px; font-size: 0.65rem; }
  }
</style>
</head>
<body>

<!-- Floating hearts background -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Celebrate overlay -->
<div class="celebrate-overlay" id="celebrateOverlay"></div>

<!-- Angry confirm modal -->
<div class="modal-overlay" id="angryModal" style="display:none;">
  <div class="modal">
    <div class="modal-emoji">😢</div>
    <p>确认记录今天<strong style="color:#ff8088;">生气了</strong>吗？<br>连续不生气天数将会<strong style="color:#ff8088;">归零</strong>。</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAngryModal()">再想想</button>
      <button class="btn-confirm" onclick="confirmAngry()">确认记录</button>
    </div>
  </div>
</div>

<!-- App -->
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="icon-row" id="headerIcon">💕</div>
    <h1>不生气打卡</h1>
    <p class="subtitle" id="headerSub">我们的约定 · 用心守护每一天</p>
  </div>

  <!-- Streak -->
  <div class="streak-card" id="streakCard">
    <div class="streak-number" id="streakNumber">0</div>
    <div class="streak-label" id="streakLabel">天没有生气了 ✨</div>
    <div class="highest">🏆 最高纪录 <span id="highestStreak">0</span> 天</div>
  </div>

  <!-- Two-person Check-in (不生气) -->
  <div class="checkin-section" id="checkinSection">
    <div class="checkin-card" id="cardBoy" onclick="checkIn('boy', event)">
      <div class="check-mark">✅</div>
      <div class="avatar">🧑</div>
      <div class="name" id="nameBoy" contenteditable="true"
           onblur="saveName('boy', this)" onclick="event.stopPropagation()">我</div>
      <div class="status" id="statusBoy">点击打卡</div>
    </div>
    <div class="checkin-card" id="cardGirl" onclick="checkIn('girl', event)">
      <div class="check-mark">✅</div>
      <div class="avatar">👩</div>
      <div class="name" id="nameGirl" contenteditable="true"
           onblur="saveName('girl', this)" onclick="event.stopPropagation()">女朋友</div>
      <div class="status" id="statusGirl">点击打卡</div>
    </div>
  </div>

  <!-- Angry Button -->
  <div class="angry-section">
    <button class="angry-btn" id="angryBtn" onclick="openAngryModal()">
      <span class="angry-emoji">😤</span> 今天生气了，记录一下
    </button>
  </div>

  <!-- Monthly Calendar -->
  <div class="calendar-card">
    <div class="cal-header">
      <span class="cal-title" id="calTitle">📅 本月记录</span>
      <span class="cal-legend">
        <span><i class="legend-dot happy"></i> 和睦</span>
        <span><i class="legend-dot angry"></i> 生气</span>
        <span><i class="legend-dot partial"></i> 待定</span>
      </span>
    </div>
    <div class="cal-weekdays">
      <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="month-stats" id="monthStats"></div>
  </div>

  <!-- Quote -->
  <p class="quote" id="quote">爱是恒久忍耐，又有恩慈 💗</p>

  <!-- Reset -->
  <div class="reset-hint" onclick="resetAll()">长按重置记录</div>

</div>

<script>
// ==================== Data Model ====================
const STORAGE_KEY = 'no_anger_checkin_v2';

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      const d = JSON.parse(raw);
      // Migrate old format
      if (!d.todayDone) d.todayDone = false;
      if (!d.nameBoy) d.nameBoy = '我';
      if (!d.nameGirl) d.nameGirl = '女朋友';
      // Normalize history: old format had string values
      for (const [k, v] of Object.entries(d.history || {})) {
        if (typeof v === 'string') {
          d.history[k] = { type: v === 'angry' ? 'angry' : v === 'both' ? 'happy' : 'partial' };
        }
      }
      return d;
    } catch(e) {}
  }
  return {
    streak: 0,
    highestStreak: 0,
    today: '',          // 'YYYY-MM-DD'
    boyChecked: false,
    girlChecked: false,
    todayDone: false,   // true once today is fully resolved (happy or angry)
    history: {},        // { 'YYYY-MM-DD': { type: 'happy' | 'angry' | 'partial' } }
    nameBoy: '我',
    nameGirl: '女朋友'
  };
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let data = loadData();

// ==================== Helpers ====================
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getMonthDays(year, month) {
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDayOfWeek = firstDay.getDay(); // 0=Sun
  const daysInMonth = lastDay.getDate();
  const cells = [];

  // Empty cells before 1st
  for (let i = 0; i < startDayOfWeek; i++) {
    cells.push(null);
  }
  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push(`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }
  return cells;
}

// ==================== Render ====================
function renderStreak() {
  const el = document.getElementById('streakNumber');
  const card = document.getElementById('streakCard');
  const label = document.getElementById('streakLabel');
  const today = todayStr();
  const todayRecord = data.history[today];

  if (todayRecord && todayRecord.type === 'angry') {
    card.classList.add('angry-today');
    el.textContent = '😞';
    el.classList.remove('pulse');
    label.textContent = '今天生气了，明天重新开始吧';
  } else {
    card.classList.remove('angry-today');
    el.textContent = data.streak;
    label.textContent = '天没有生气了 ✨';
    el.classList.remove('pulse');
    void el.offsetWidth;
    if (data.streak > 0) el.classList.add('pulse');
  }

  document.getElementById('highestStreak').textContent = data.highestStreak;

  // Update header
  if (todayRecord && todayRecord.type === 'angry') {
    document.getElementById('headerIcon').textContent = '💔';
    document.getElementById('headerSub').textContent = '没关系，明天会更好';
  } else if (data.todayDone && !todayRecord) {
    // shouldn't happen, but just in case
  } else {
    document.getElementById('headerIcon').textContent = '💕';
    document.getElementById('headerSub').textContent = '我们的约定 · 用心守护每一天';
  }
}

function renderCards() {
  const cardBoy = document.getElementById('cardBoy');
  const cardGirl = document.getElementById('cardGirl');
  const statusBoy = document.getElementById('statusBoy');
  const statusGirl = document.getElementById('statusGirl');

  // Reset all states
  cardBoy.className = 'checkin-card';
  cardGirl.className = 'checkin-card';
  cardBoy.style.pointerEvents = '';
  cardGirl.style.pointerEvents = '';

  if (data.todayDone) {
    // Today is already resolved
    const today = todayStr();
    const record = data.history[today];
    if (record && record.type === 'happy') {
      cardBoy.classList.add('done');
      cardGirl.classList.add('done');
      statusBoy.textContent = '今天和睦 ✓';
      statusGirl.textContent = '今天和睦 ✓';
    }
    // Don't add today-done class since we want to show the happy state
  } else {
    // Today is still open
    if (data.boyChecked) {
      cardBoy.classList.add('checked');
      statusBoy.textContent = '已打卡 ✓';
    } else {
      statusBoy.textContent = '点击打卡';
    }
    if (data.girlChecked) {
      cardGirl.classList.add('checked');
      statusGirl.textContent = '已打卡 ✓';
    } else {
      statusGirl.textContent = '点击打卡';
    }
  }

  // If todayDone, disable further check-ins
  if (data.todayDone) {
    cardBoy.classList.add('today-done');
    cardGirl.classList.add('today-done');
  }
}

function renderCalendar() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const today = todayStr();
  const cells = getMonthDays(year, month);
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  cells.forEach(dateStr => {
    const cell = document.createElement('div');
    cell.className = 'day-cell';

    if (dateStr === null) {
      cell.classList.add('empty');
      grid.appendChild(cell);
      return;
    }

    const dayNum = parseInt(dateStr.split('-')[2]);
    const record = data.history[dateStr];

    cell.innerHTML = `<span class="day-num">${dayNum}</span>`;

    if (record) {
      if (record.type === 'happy') {
        cell.classList.add('happy');
        cell.innerHTML = `<span class="day-num">${dayNum}</span><span class="day-icon">💕</span>`;
      } else if (record.type === 'angry') {
        cell.classList.add('angry');
        cell.innerHTML = `<span class="day-num">${dayNum}</span><span class="day-icon">💔</span>`;
      } else if (record.type === 'partial') {
        cell.classList.add('partial');
        cell.innerHTML = `<span class="day-num">${dayNum}</span><span class="day-icon">◐</span>`;
      }
    }

    if (dateStr === today) {
      cell.classList.add('today');
    }

    // Tooltip
    if (record) {
      const typeLabel = record.type === 'happy' ? '和睦' : record.type === 'angry' ? '生气了' : '待定';
      cell.title = `${dateStr} · ${typeLabel}`;
    }

    grid.appendChild(cell);
  });

  // Update month title
  const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
  document.getElementById('calTitle').textContent = `📅 ${year}年${monthNames[month]}`;

  // Update stats
  renderMonthStats(year, month);
}

function renderMonthStats(year, month) {
  let happyCount = 0, angryCount = 0;
  for (const [dateStr, record] of Object.entries(data.history)) {
    const [y, m] = dateStr.split('-').map(Number);
    if (y === year && m === month + 1) {
      if (record.type === 'happy') happyCount++;
      else if (record.type === 'angry') angryCount++;
    }
  }
  const total = happyCount + angryCount;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const passedDays = Math.min(daysInMonth, new Date().getDate());
  const remaining = Math.max(0, passedDays - total);

  document.getElementById('monthStats').innerHTML = `
    <div class="stat"><span class="stat-val good">${happyCount}</span> 天和睦</div>
    <div class="stat"><span class="stat-val bad">${angryCount}</span> 天生气</div>
    <div class="stat"><span class="stat-val">${remaining}</span> 天未记录</div>
  `;
}

function renderAll() {
  renderStreak();
  renderCards();
  renderCalendar();

  // Angry button state
  const angryBtn = document.getElementById('angryBtn');
  if (data.todayDone) {
    angryBtn.classList.add('today-done');
  } else {
    angryBtn.classList.remove('today-done');
  }
}

// ==================== Check-in Logic ====================
function checkIn(person, evt) {
  const today = todayStr();

  // If today is already done, reject
  if (data.todayDone) {
    showToast('今天的记录已经完成啦~ 明天再来吧 💤');
    return;
  }

  // If it's a new day, reset
  if (data.today !== today) {
    data.today = today;
    data.boyChecked = false;
    data.girlChecked = false;
    data.todayDone = false;
  }

  // Already checked in for this person today
  if (person === 'boy' && data.boyChecked) {
    showToast('今天已经打过卡啦~ ❤️');
    return;
  }
  if (person === 'girl' && data.girlChecked) {
    showToast('今天已经打过卡啦~ ❤️');
    return;
  }

  // Perform check-in
  if (person === 'boy') data.boyChecked = true;
  if (person === 'girl') data.girlChecked = true;

  // Ripple effect
  const cardEl = person === 'boy' ? document.getElementById('cardBoy') : document.getElementById('cardGirl');
  addRipple(cardEl, evt);

  // Check if both have checked in
  if (data.boyChecked && data.girlChecked) {
    // Both checked in — mark today as happy!
    data.todayDone = true;
    data.boyChecked = false;
    data.girlChecked = false;
    data.streak++;
    if (data.streak > data.highestStreak) {
      data.highestStreak = data.streak;
    }
    data.history[today] = { type: 'happy' };

    saveData(data);
    renderAll();
    celebrate();
    showToast(`🎉 太棒了！连续 ${data.streak} 天没有生气了！`);
  } else {
    // Only one checked in
    data.history[today] = { type: 'partial' };
    saveData(data);
    renderAll();

    const who = person === 'boy' ? '你' : '女朋友';
    showToast(`${who} 已打卡，等另一半也打卡哦~ 💌`);
  }
}

// ==================== Angry Logic ====================
function openAngryModal() {
  if (data.todayDone) return;
  document.getElementById('angryModal').style.display = 'flex';
}

function closeAngryModal() {
  document.getElementById('angryModal').style.display = 'none';
}

function confirmAngry() {
  const today = todayStr();
  document.getElementById('angryModal').style.display = 'none';

  // Reset streak
  data.streak = 0;
  data.today = today;
  data.todayDone = true;
  data.boyChecked = false;
  data.girlChecked = false;
  data.history[today] = { type: 'angry' };

  saveData(data);
  renderAll();
  showToast('已记录。抱抱，明天重新开始 💪💕', true);
}

// ==================== Effects ====================
function addRipple(el, evt) {
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (evt.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (evt.clientY - rect.top - size / 2) + 'px';
  el.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}

function celebrate() {
  const overlay = document.getElementById('celebrateOverlay');
  const emojis = ['🎉', '💕', '✨', '💖', '🎊', '🥰', '💝', '🌟', '💗', '😍', '💘', '🌹'];

  for (let i = 0; i < 36; i++) {
    const confetti = document.createElement('span');
    confetti.className = 'confetti';
    confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    confetti.style.animationDuration = (2 + Math.random() * 3) + 's';
    confetti.style.animationDelay = Math.random() * 0.5 + 's';
    overlay.appendChild(confetti);
    confetti.addEventListener('animationend', () => confetti.remove());
  }
}

function showToast(msg, isAngry) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.toggle('angry-toast', !!isAngry);
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 2400);
}

// ==================== Save Name ====================
function saveName(person, el) {
  const name = el.textContent.trim() || (person === 'boy' ? '我' : '女朋友');
  if (person === 'boy') data.nameBoy = name;
  else data.nameGirl = name;
  saveData(data);
}

// ==================== Floating Hearts ====================
function createFloatingHearts() {
  const bg = document.getElementById('heartsBg');
  const hearts = ['💕', '💖', '💗', '💝', '💘', '❤️', '🩷'];

  function spawn() {
    const heart = document.createElement('span');
    heart.className = 'floating-heart';
    heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    heart.style.left = Math.random() * 96 + '%';
    heart.style.fontSize = (0.7 + Math.random() * 1.5) + 'rem';
    heart.style.animationDuration = (8 + Math.random() * 14) + 's';
    bg.appendChild(heart);
    heart.addEventListener('animationend', () => heart.remove());
  }

  setInterval(spawn, 1300);
  for (let i = 0; i < 5; i++) {
    setTimeout(spawn, i * 500);
  }
}

// ==================== Reset ====================
function resetAll() {
  if (confirm('确定要重置所有打卡记录吗？\n\n这个操作不可撤销哦~ 🥺')) {
    data = {
      streak: 0,
      highestStreak: 0,
      today: todayStr(),
      boyChecked: false,
      girlChecked: false,
      todayDone: false,
      history: {},
      nameBoy: data.nameBoy || '我',
      nameGirl: data.nameGirl || '女朋友'
    };
    saveData(data);
    renderAll();
    showToast('已重置，重新开始吧~ 💪');
  }
}

// ==================== Quote Rotation ====================
const quotes = [
  '爱是恒久忍耐，又有恩慈 💗',
  '两个人在一起，就是最好的事 🌟',
  '每一次忍耐，都是爱的证明 💝',
  '愿我们永远不说再见 🥰',
  '你是我的心跳，也是我的平静 💕',
  '最好的爱情，是一起变得更好 ✨',
  '不生气，因为舍不得让你难过 💖',
  '我们的每一天，都值得珍惜 🌹',
  '吵架是暂时的，爱是永远的 💘',
  '和好之后，感情会更深 🤗',
];

function rotateQuote() {
  const el = document.getElementById('quote');
  const idx = Math.floor(Math.random() * quotes.length);
  el.style.opacity = '0';
  setTimeout(() => {
    el.textContent = quotes[idx];
    el.style.opacity = '0.7';
  }, 400);
}

// ==================== Init ====================
function init() {
  const today = todayStr();

  // New day logic
  if (data.today !== today) {
    // Yesterday was partially checked in (only one person) → streak broken
    if (data.today && !data.todayDone && (data.boyChecked || data.girlChecked)) {
      data.streak = 0;
      // Mark yesterday as partial (no change needed, it's already in history)
    }
    // Reset for new day
    data.today = today;
    data.boyChecked = false;
    data.girlChecked = false;
    data.todayDone = false;
    saveData(data);
  }

  // Restore saved names
  document.getElementById('nameBoy').textContent = data.nameBoy || '我';
  document.getElementById('nameGirl').textContent = data.nameGirl || '女朋友';

  // If today was already resolved (angry/happy), render accordingly
  renderAll();
  createFloatingHearts();

  // Rotate quote every 8 seconds
  setInterval(rotateQuote, 8000);
  rotateQuote();
}

init();
